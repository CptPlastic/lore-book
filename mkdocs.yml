site_name: Lore
site_description: The spellbook for your codebase
site_url: https://cptplastic.github.io/lore-book/
repo_url: https://github.com/cptplastic/lore-book
repo_name: cptplastic/lore-book

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Install: install.md
  - Concepts: concepts.md
  - CLI: cli.md
  - FAQ: faq.md
